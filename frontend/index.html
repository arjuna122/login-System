<!DOCTYPE html>
<html>
<head>
  <title>Login System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- LOGIN -->
  <div id="loginBox" class="card">
    <h2>Login</h2>

    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p id="msg"></p>

    <p onclick="showRegister()" style="cursor:pointer;color:blue;">
      Belum punya akun? Register
    </p>
  </div>

  <!-- REGISTER -->
  <div id="registerBox" class="card hidden">
    <h2>Register</h2>

    <input id="rusername" placeholder="Username">
    <input id="rpassword" type="password" placeholder="Password">

    <button onclick="register()">Register</button>

    <p id="rmsg"></p>

    <p onclick="showLogin()" style="cursor:pointer;color:blue;">
      Sudah punya akun? Login
    </p>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboardBox" class="card hidden dashboard">

    <div class="topbar">
      <h2>Dashboard</h2>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <p id="welcomeText">Welcome Back 👏</p>

    <div class="stats">
      <div class="stat-box">
        <h3 id="totalPosts">0</h3>
        <span>Total Posts</span>
      </div>
      <div class="stat-box">
        <h3>Online</h3>
        <span>Status</span>
      </div>
    </div>
    
    <button onclick="loadPosts()">Refresh Posts</button>

    <div id="posts"></div>
    
  </div>

</div>

<script src="app.js"></script>

</body>
</html>
